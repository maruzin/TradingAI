app = "tradingai-api"
primary_region = "lhr"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8080"
  ENVIRONMENT = "production"

# Two process groups: HTTP API and the Arq cron worker.
# Each runs on its own Fly machine (~$2/mo each for 256MB shared).
[processes]
  app    = "uv run uvicorn app.main:app --host 0.0.0.0 --port 8080 --proxy-headers --forwarded-allow-ips '*'"
  worker = "uv run arq app.workers.arq_main.WorkerSettings"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]
  [[http_service.checks]]
    grace_period = "10s"
    interval = "30s"
    method = "GET"
    timeout = "5s"
    path = "/healthz"

# HTTP machine (the API)
[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
  processes = ["app"]

# Worker machine (Arq cron). Smaller is fine — workers don't serve HTTP.
[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
  processes = ["worker"]
